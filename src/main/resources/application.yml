spring:
  application:
    name: delong-ai-zero-code
  #session配置
  session:
    store-type: redis
    # session过期时间
    timeout: 2592000

  profiles:
    active: local



server:
  port: 8124
  servlet:
    context-path: /api
    # cookie 30天过期
    session:
      cookie:
        max-age: 2592000



springdoc:
  group-configs:
      - group: 'default'
        packages-to-scan: com.token.delongaizerocode.controller

# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always



