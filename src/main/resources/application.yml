spring:
  application:
    name: delong-ai-zero-code
  #session配置
  session:
    store-type: redis
    # session过期时间
    timeout: 2592000

  profiles:
    active: local


server:
  port: 8124
  servlet:
    context-path: /api
    # cookie 30天过期
    session:
      cookie:
        max-age: 2592000



springdoc:
  group-configs:
      - group: 'default'
        packages-to-scan: com.token.delongaizerocode.controller
knife4j:
  enable: true
  setting:
    language: zh_cn



