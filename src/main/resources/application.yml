spring:
  application:
    name: delong-ai-zero-code
  #session配置
  session:
    store-type: redis
    # session过期时间
    timeout: 2592000

  profiles:
    active: local
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
      database: 0


server:
  port: 8124
  servlet:
    context-path: /api
    # cookie 30天过期
    session:
      cookie:
        max-age: 2592000



springdoc:
  group-configs:
      - group: 'default'
        packages-to-scan: com.token.delongaizerocode.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always



